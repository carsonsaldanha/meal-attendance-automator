<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 15px; width: 350px; background-color: #f9f9f9; }
    h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #333; }
    button { padding: 10px; width: 100%; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
    #startPauseBtn { background-color: #4CAF50; color: white; }
    #startPauseBtn:hover { opacity: 0.9; }
    #stopBtn { background-color: #f44336; color: white; }
    #stopBtn:hover { background-color: #da190b; }
    #status { font-size: 12px; color: #555; word-wrap: break-word; font-weight: bold; margin-bottom: 5px; }
    #logWindow { margin-top: 10px; height: 180px; overflow-y: scroll; font-size: 11px; font-family: monospace; background: white; border: 1px solid #ccc; padding: 5px; }
  </style>
</head>
<body>
  <h3>Meal Attendance Sync</h3>
  <button id="startPauseBtn">Start Automation</button>
  <button id="stopBtn">Stop Automation</button>
  <button id="clearBtn" style="background-color: #888; color: white;">Clear Log</button>
  <div id="status">Ready.</div>
  <div id="logWindow"></div>
  <script src="popup.js"></script>
</body>
</html>
